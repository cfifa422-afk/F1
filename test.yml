name: Test F1 Bot Code

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check syntax
      run: |
        python -m py_compile bot.py
        python -m py_compile cards.py
        python -m py_compile database.py
    
    - name: Install flake8
      run: pip install flake8
    
    - name: Lint with flake8
      run: |
        # Stop build on syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # Check code style (non-fatal)
        flake8 . --count --max-line-length=120 --statistics || true
    
    - name: Test imports
      run: |
        python -c "import bot"
        python -c "import cards"
        python -c "import database"
    
    - name: Success!
      run: echo "✅ All tests passed! Bot code is ready."
